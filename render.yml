services:
  - type: web
    name: adega-keycloak
    plan: free # Requer atenção especial à memória
    runtime: docker
    dockerImage: quay.io/keycloak/keycloak:latest
    dockerCommand: start-dev # Comando para modo desenvolvimento
    envVars:
      # --- BANCO DE DADOS (NEON) ---
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        value: jdbc:postgresql://ep-rapid-forest-ams8xemm-pooler.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require
      - key: KC_DB_USERNAME
        value: neondb_owner
      - key: KC_DB_PASSWORD
        value: npg_OwuCLEAoh9G5
      
      # --- ADMINISTRAÇÃO ---
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        value: admin
      
      # --- REDE E HOSTNAME ---
      - key: KC_HTTP_ENABLED
        value: "true"
      - key: KC_HOSTNAME_STRICT
        value: "false"
      - key: KC_HOSTNAME
        value: adega-keycloak.onrender.com

      # --- OTIMIZAÇÃO DE MEMÓRIA (CRÍTICO) ---
      - key: JAVA_OPTS_APPEND
        value: "-Xms128m -Xmx256m"
      - key: KC_DB_POOL_MAX_SIZE
        value: "2"