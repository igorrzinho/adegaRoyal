services:
  # ==========================================
  # SERVIÇO 1: KEYCLOAK (Imagem externa)
  # ==========================================
  - type: web
    name: adega-keycloak
    plan: free 
    runtime: docker
    image: quay.io/keycloak/keycloak:latest
    command: start-dev 
    envVars:
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        value: jdbc:postgresql://ep-rapid-forest-ams8xemm-pooler.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require
      - key: KC_DB_USERNAME
        value: neondb_owner
      - key: KC_DB_PASSWORD
        value: npg_OwuCLEAoh9G5
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        value: admin
      - key: KC_HTTP_ENABLED
        value: "true"
      - key: KC_HOSTNAME_STRICT
        value: "false"
      - key: KC_HOSTNAME
        value: adega-keycloak.onrender.com
      - key: JAVA_OPTS_APPEND
        value: "-Xms128m -Xmx256m"
      - key: KC_DB_POOL_MAX_SIZE
        value: "2"

  # ==========================================
  # SERVIÇO 2: API .NET (Código fonte em /api)
  # ==========================================
  - type: web
    name: adega-api
    plan: free
    runtime: docker
    rootDir: api # <-- AQUI ESTÁ O SEGREDO! O Render entra nesta pasta antes de fazer o build.
    dockerfilePath: ./Dockerfile # Procura o Dockerfile dentro de /api
    dockerContext: . # Executa o comando docker build de dentro de /api
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Development
      - key: ConnectionStrings__DefaultConnection
        value: postgresql://neondb_owner:npg_OwuCLEAoh9G5@ep-rapid-forest-ams8xemm-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      
      # Integração com o Keycloak acima
      - key: Keycloak__BaseUrl
        value: https://adega-keycloak.onrender.com
      - key: Keycloak__Realm
        value: auth-demo
      - key: Keycloak__PublicClientId
        value: public-client
      - key: Authentication__ValidIssuer
        value: https://adega-keycloak.onrender.com/realms/auth-demo