services:
  - type: web
    name: adega-keycloak
    plan: free 
    runtime: image
    image: 
      url: quay.io/keycloak/keycloak:26.6.1
    # Adicionado --http-port=8080 para forçar a porta correta
    startCommand: /opt/keycloak/bin/kc.sh start-dev --http-port=8080
    envVars:
      # Adicionadas as duas variáveis vitais para o Render não matar o processo
      - key: PORT
        value: "8080"
      - key: KC_PROXY
        value: edge
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        value: jdbc:postgresql://ep-rapid-forest-ams8xemm-pooler.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require
      - key: KC_DB_USERNAME
        value: neondb_owner
      - key: KC_DB_PASSWORD
        value: npg_OwuCLEAoh9G5
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        value: admin
      - key: KC_HTTP_ENABLED
        value: "true"
      - key: KC_HOSTNAME_STRICT
        value: "false"
      - key: KC_HOSTNAME
        value: adega-keycloak.onrender.com
      - key: JAVA_OPTS_APPEND
        value: "-Xms128m -Xmx256m"
      - key: KC_DB_POOL_MAX_SIZE
        value: "2"

  - type: web
    name: adega-api
    plan: free
    runtime: docker
    rootDir: api 
    dockerfilePath: ./Dockerfile 
    dockerContext: . 
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Development
      - key: ConnectionStrings__DefaultConnection
        value: postgresql://neondb_owner:npg_OwuCLEAoh9G5@ep-rapid-forest-ams8xemm-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      
      - key: Keycloak__BaseUrl
        value: https://adega-keycloak.onrender.com
      - key: Keycloak__Realm
        value: auth-demo
      - key: Keycloak__PublicClientId
        value: public-client
      - key: Authentication__ValidIssuer
        value: https://adega-keycloak.onrender.com/realms/auth-demo