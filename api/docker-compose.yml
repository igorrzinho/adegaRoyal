version: '3.8'

networks:
  adega-network:
    name: adega-network
    driver: bridge

volumes:
  adega_postgres_data:

services:
  postgres:
    image: postgres:17
    container_name: adega_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Keycloak!123
    ports:
      - "5432:5432"
    networks:
      - adega-network
    volumes:
      - adega_postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: adega_keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/Keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: "Keycloak@123!"
      KC_DB_SCHEMA: public
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8080:8080"
    networks:
      - adega-network
    depends_on:
      postgres:
        condition: service_healthy

  api-adega:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adega_api
    env_file:
      - .env
    ports:
      - "5065:5065"
    networks:
      - adega-network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy