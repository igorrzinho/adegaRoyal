services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: adega-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Keycloak!123
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Keycloak!123' -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - adega-network

  import-tool:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: adega-import-tool
    volumes:
      - ./Bacpac:/container_backup
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "Verificando se o banco Keycloak já tem dados..."
        apt-get update && apt-get install -y libicu-dev
        
        echo "Instalando SqlPackage..."
        dotnet tool install --global Microsoft.SqlPackage
        
        export PATH="/root/.dotnet/tools:$$PATH"
        
        # Verificar se o banco Keycloak já tem tabelas
        echo "Verificando se o banco Keycloak já tem dados..."
        TABLE_COUNT=$(sqlcmd -S sqlserver -U sa -P 'Keycloak!123' -Q "USE Keycloak; SELECT COUNT(*) FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_TYPE = 'BASE TABLE';" -h -1 2>/dev/null || echo "0")
        
        if [ "$TABLE_COUNT" -gt "0" ]; then
          echo "Banco Keycloak já tem $TABLE_COUNT tabelas. Pulando importação."
          exit 0
        fi
        
        echo "Iniciando importação do Keycloak.bacpac..."
        sqlpackage /Action:Import /SourceFile:/container_backup/Keycloak.bacpac /TargetServerName:sqlserver /TargetDatabaseName:Keycloak /TargetUser:sa /TargetPassword:Keycloak!123 /TargetTrustServerCertificate:True
        
        echo "Importação do Keycloak.bacpac concluída!"
    networks:
      - adega-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: adega-keycloak
    command: start-dev
    environment:
      - KC_DB=mssql
      - KC_DB_URL=jdbc:sqlserver://sqlserver:1433;databaseName=Keycloak;encrypt=true;trustServerCertificate=true;
      - KC_DB_USERNAME=sa
      - KC_DB_PASSWORD=Keycloak!123
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
    depends_on:
      import-tool:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    networks:
      - adega-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adega-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8000
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=AppTaskDb;User Id=sa;Password=Keycloak!123;TrustServerCertificate=True;
      - Keycloak__BaseUrl=https://crispy-chainsaw-jgppg5px4grh5xqr-8080
      - Keycloak__Realm=auth-demo
      - Keycloak__AdminUsername=admin
      - Keycloak__AdminPassword=admin
      - Keycloak__PublicClientId=public-client
      - Keycloak__AuthorizationUrl=https://crispy-chainsaw-jgppg5px4grh5xqr-8080.app.github.dev/realms/auth-demo/protocol/openid-connect/auth
      - Keycloak__TokenUrl=https://crispy-chainsaw-jgppg5px4grh5xqr-8080.app.github.dev/realms/auth-demo/protocol/openid-connect/token
      - Authentication__MetadataAddress=https://crispy-chainsaw-jgppg5px4grh5xqr-8080.app.github.dev/realms/auth-demo/.well-known/openid-configuration
      - Authentication__ValidIssuer=https://crispy-chainsaw-jgppg5px4grh5xqr-8080.app.github.dev/realms/auth-demo
      - Authentication__ClientId=public-client
    ports:
      - "8000:8000"
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - adega-network

networks:
  adega-network:
    driver: bridge